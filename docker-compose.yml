version: "3.9"

services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: quant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  stock-ai-agent:
    build: ./stock-ai-agent
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgresql:5432/quant_db
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SCHEDULE_HOUR: ${SCHEDULE_HOUR:-14}
      SCHEDULE_MINUTE: ${SCHEDULE_MINUTE:-35}
    depends_on:
      - postgresql
    restart: unless-stopped

volumes:
  pg_data:
